<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水とパイプの体験まつり | 小松管工事協同組合青年部40周年記念</title>
    <style>
        :root {
            --water-blue: #00b4d8;
            --water-dark: #03045e;
            --water-light: #90e0ef;
            --water-clear: #caf0f8;
            --accent-orange: #ff7043;
            --accent-yellow: #ffca28;
            --text-color: #2c3e50;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            color: var(--text-color);
            background-color: var(--water-clear);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* 背景の水滴アニメーション */
        .bubble-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(0, 180, 216, 0.15);
            border-radius: 50%;
            animation: rise 12s infinite ease-in-out;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
        }

        /* フェードインエフェクト */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* ヒーローセクション */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            color: var(--white);
            background: linear-gradient(135deg, rgba(3, 4, 94, 0.85) 0%, rgba(0, 180, 216, 0.6) 100%), 
                        url('https://images.unsplash.com/photo-1542013936693-8848e57423e3?q=80&w=1920&auto=format&fit=cover') no-repeat center center/cover;
            overflow: hidden;
        }

        /* 配管をイメージした装飾ライン */
        .pipe-line-deco {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15px;
            background: linear-gradient(90deg, #b0bec5, #cfd8dc, #b0bec5);
            border-top: 3px solid #78909c;
            border-bottom: 3px solid #37474f;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.3);
        }

        .hero-inner {
            max-width: 1000px;
            z-index: 2;
        }

        .badge-40th {
            display: inline-block;
            background: linear-gradient(45deg, var(--accent-orange), var(--accent-yellow));
            color: var(--white);
            font-weight: 900;
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(255,112,67,0.4);
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .hero h1 {
            font-size: 3.8rem;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 25px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .hero h1 span {
            font-size: 1.8rem;
            display: block;
            color: var(--water-light);
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .catch-container {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px dashed var(--water-light);
            padding: 20px 40px;
            border-radius: 15px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .hero-catch {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent-yellow);
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .hero-meta {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 40px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .btn-water {
            display: inline-block;
            background: linear-gradient(90deg, #0077b6, #00b4d8);
            color: var(--white);
            font-size: 1.6rem;
            font-weight: bold;
            text-decoration: none;
            padding: 22px 60px;
            border-radius: 50px;
            box-shadow: 0 8px 25px rgba(0,180,216,0.5);
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.4);
        }

        .btn-water:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 35px rgba(0,180,216,0.7);
            background: linear-gradient(90deg, #00b4d8, #00f5d4);
        }

        /* セクション共通 */
        section {
            padding: 120px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--water-dark);
            margin-bottom: 80px;
            position: relative;
        }

        .section-title::after {
            content: '💧';
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.8rem;
        }

        /* 祭りの特徴 */
        .feature-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            background: var(--white);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(3,4,94,0.05);
            border-left: 10px solid var(--water-blue);
        }

        .feature-img-wrapper {
            position: relative;
        }

        .feature-img {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            display: block;
        }

        .feature-content h3 {
            font-size: 2rem;
            color: var(--water-dark);
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .feature-content p {
            font-size: 1.15rem;
            color: #4a5568;
            margin-bottom: 20px;
            text-align: justify;
        }

        /* 出し物・イベント内容 */
        .event-section {
            background: linear-gradient(180deg, var(--water-clear) 0%, #ffffff 50%, var(--water-clear) 100%);
            max-width: 100%;
        }

        .event-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
        }

        .event-card {
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 25px rgba(0,0,0,0.04);
            transition: all 0.3s ease;
            border: 1px solid rgba(0,180,216,0.1);
        }

        .event-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(0,180,216,0.25);
        }

        .event-img-box {
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .event-card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .event-card:hover .event-card-img {
            transform: scale(1.08);
        }

        .event-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(3, 4, 94, 0.85);
            color: var(--white);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }

        .event-body {
            padding: 30px;
        }

        .event-body h3 {
